# ============================================================
# ТВОИ ПРЕДПОЧТЕНИЯ И ИНСТРУКЦИИ ДЛЯ КОНТЕНТА
# ============================================================
# Это главный файл настройки — аналог инструкций в Claude Projects.
# Редактируй этот файл, не трогая код. Claude будет следовать
# этим правилам при фильтрации новостей и генерации контента.
# ============================================================

# ── ФИЛЬТРАЦИЯ НОВОСТЕЙ ───────────────────────────────────────────────

news_filter:

  # Темы которые НУЖНЫ — AI будет приоритизировать их
  priority_topics:
    - "экономика и бизнес"
    - "инфраструктура и строительство"
    - "технологии и IT"
    - "происшествия и криминал"
    - "политика и власть"
    - "общество и социалка"
    - "транспорт (поезда, авиа, дороги)"
    - "иностранные инвестиции"
    - "туризм"

  # Темы которые НЕ НУЖНЫ — AI будет их исключать
  exclude_topics:
    - "спорт (если не мировой уровень)"
    - "развлечения и шоу-бизнес"
    - "религиозные праздники (если не новость)"
    - "поздравления и награждения"
    - "пресс-конференции без конкретных новостей"

  # Ключевые слова для ПРЕДВАРИТЕЛЬНОГО фильтра (до AI)
  # Новость сохраняется в БД ТОЛЬКО если содержит хотя бы одно
  # Оставь пустым [] чтобы принимать ВСЕ новости
  require_any_keyword: []

  # Ключевые слова которые СРАЗУ исключают новость (до AI, быстрее и дешевле)
  # Экономит токены — не тратим API на явный мусор
  hard_exclude_keywords:
    - "реклама"
    - "sponsored"
    - "промо"
    - "партнерский материал"
    - "поздравляем"
    - "конкурс"
    - "акция"
    - "скидка"

  # Максимальный возраст новости в часах (0 = без ограничения)
  max_age_hours: 48

  # Насколько важной должна быть новость чтобы пройти (1-10)
  min_importance_score: 6


# ── ELEVENLABS НАСТРОЙКИ ──────────────────────────────────────────────
# API ключи и voice_id задаются через Railway Variables:
#   ELEVENLABS_API_KEY_1 / ELEVENLABS_VOICE_ID_1   — аккаунт 1
#   ELEVENLABS_API_KEY_2 / ELEVENLABS_VOICE_ID_2   — аккаунт 2 (если есть)
elevenlabs:
  model_id: "eleven_multilingual_v2"
  output_format: "mp3_44100_128"
  voice_settings:
    stability: 0.45         # 0-1. Ниже = живее и эмоциональнее
    similarity_boost: 0.80  # 0-1. Близость к оригинальному голосу
    style: 0.35             # 0-1. Выразительность стиля
    speed: 1.05             # 0.7-1.2. Скорость речи (1.0 = норм)
    use_speaker_boost: true # Улучшение качества голоса

# ── ИНСТРУКЦИИ ПО СТИЛЮ КОНТЕНТА ─────────────────────────────────────

content_style:

  # Общий тон аккаунта
  account_tone: |
    Новостной Instagram-аккаунт про Узбекистан.
    Аудитория: узбекистанцы и русскоязычная диаспора.
    Тон: серьезный, информативный — но эмоционально резонирующий.
    Язык: простой и понятный русский, без канцелярщины.
    Цифры и факты важнее эмоций — но подача должна задевать.

  # ─────────────────────────────────────────────────────
  # ПРЕВЬЮ ЗАГОЛОВОК — обложка Reels (3-4 слова max)
  # Это то что человек видит В ЛЕНТЕ до нажатия на видео.
  # Задача: остановить скролл. Суть новости в минимуме слов.
  # ─────────────────────────────────────────────────────
  preview_title_rules: |
    - 2-4 слова максимум. Если можно сказать в 2 — говори в 2.
    - Работает без контекста — человек видит только это в ленте
    - Если есть чёткий факт или последствие — используй формулу [А] = [Б]:
        "Долг = нет света"   (2+2 слова — идеально)
        "Взятка = 10 лет"    (2+2)
        "Украли 2 млрд"      (2 слова — лучше)
    - Если формула не подходит — просто самые сильные слова:
        "Цены растут"
        "Поймали чиновника"
        "Новые штрафы"
    - Цифры всегда работают: "100 млн", "15 лет", "+30%"
    - Эмодзи в начале — можно если усиливает: "💰 Украли", "⚡ Без света"
    - НЕЛЬЗЯ: предложения, союзы, "в Узбекистане", "сегодня", "важно"
    - Тест: если убрать одно слово и смысл не теряется — убирай

  # ─────────────────────────────────────────────────────
  # ЗАГОЛОВОК (headline) — устарело, не используется
  # Оставлено для обратной совместимости
  # ─────────────────────────────────────────────────────
  headline_rules: |
    - Максимум 6-8 слов — чем короче, тем лучше
    - Цепляет и провоцирует реакцию — но не врёт
    - Можно и нужно использовать триггерные слова когда они уместны:
        "СРОЧНО", "ШОК", "СКАНДАЛ", "ПОЗОР", "ПРОВАЛ", "НАКОНЕЦ-ТО"
    - Формула которая работает: [Эмоция/факт] = [последствие]
        Примеры хитов:
        "Долг = нет света"
        "Украли = сидишь"
        "Заплатил = едешь"
    - Также работают классические заголовки с фактом:
        "В Ташкенте запустят 5 новых автобусных маршрутов"
        "Узбекистан вошёл в топ-50 счастливых стран"
    - Вопросительные заголовки — только если реально интригуют
    - Задача заголовка: человек должен остановить скролл

  # Правила для CAPTION (описание в Instagram)
  caption_rules: |
    - Структура: факт → детали → контекст → вывод
    - Первые 2 строки самые важные (видны без "читать далее")
    - Используй эмодзи умеренно, только по смыслу
    - Абзацы разделяй пустой строкой
    - В конце: провокационный вопрос к аудитории (см. правила аутро ниже)
    - Формат числительных: 1,5 млрд (не 1500000000)
    - Источник указывать в конце: "📎 Источник: Gazeta.uz"
    - БЕЗ хэштегов — вообще никаких, нигде

  # Правила для TTS СКРИПТА (текст для ElevenLabs)
  # ─────────────────────────────────────────────────────
  # ВАЖНО: этот текст будет ПРОИЗНЕСЁН синтезированным голосом.
  # Пиши так, как говорят — не как пишут в газете.
  # Пунктуация управляет паузами в голосе.
  # ─────────────────────────────────────────────────────
  tts_rules: |
    ДЛИНА: 35-45 секунд (~80-100 слов). Короче — лучше, если всё сказано.

    ═══ ФОРМУЛА (строго в этом порядке) ═══

    1. УДАР — первое предложение цепляет, иначе человек уйдёт
       Типы хуков — выбери по теме новости:
         страх:    "Ты можешь [плохое последствие] — и даже не знать об этом."
         запрет:   "Тебе теперь [нельзя / придётся / могут отказать]."
         потеря:   "Ты теряешь [деньги/право/возможность] — прямо сейчас."
         конфликт: "[Кого-то] [сделали что-то несправедливое]."

    2. ЧТО ПРОИЗОШЛО — факт. Кто, что, где. 1-2 предложения.

    3. ПОЧЕМУ ЭТО ВАЖНО — последствие для человека. 1 предложение.
       Правило "близко к человеку":
         НЕТ: "государство внедряет"  → ДА: "тебе теперь придётся"
         НЕТ: "курс упал"             → ДА: "ты теряешь деньги, ничего не делая"
         НЕТ: "выявлены нарушения"   → ДА: "ты мог это купить и не знать"

    4. УСИЛЕНИЕ — одна ключевая цифра или деталь. 1 предложение.

    5. ВОПРОС — аутро на эмоцию (см. правила аутро ниже)

    ═══ ПРИМЕР ДО/ПОСЛЕ ═══

    ПЛОХО (новостной стиль):
      "В Андижане выявили три подпольные лаборатории.
       Изъято шестьдесят тысяч упаковок. Сырьё завозили нелегально."

    ХОРОШО (по формуле):
      "Ты можешь покупать поддельные лекарства — и даже не знать об этом.
       В Андижане нашли сразу три подпольные лаборатории.
       Часть из шестидесяти тысяч упаковок уже могла попасть в аптеки.
       И сырьё для них завозили нелегально."

    ═══ ТЕХНИЧЕСКИЕ ПРАВИЛА ═══

    Каждое предложение — одна мысль, максимум 12-14 слов.
    Точка = пауза. Запятая = короткая пауза. Тире — акцент.
    Числа: "пять миллиардов сумов" (не "5 млрд"), "двадцать процентов"
    Валюта: "долларов", "сумов" — не символы.
    Аббревиатуры: "Центральный банк" (не "ЦБ").

    ЗАПРЕЩЕНО (ломает ElevenLabs):
    Скобки () [] {}, символы # @ * / \, хэштеги, эмодзи, кавычки внутри фраз.

    ═══ ЧЕГО НЕ ДЕЛАТЬ ═══

    НЕ начинай с "В Узбекистане...", "Сегодня...", "По данным..."
    НЕ пересказывай заголовок — ударь сразу по человеку.
    НЕ используй пассивный залог: не "было выявлено", а "нашли", "поймали".
    НЕ добавляй выводы от себя — только факты + эмоция.

  # Аутро TTS — финальный вопрос, ПРИВЯЗАННЫЙ к теме новости
  # Цель: вызвать реакцию, заставить думать и комментировать
  # ВАЖНО: аутро должно ОРГАНИЧНО вытекать из темы, не быть шаблонным
  tts_outro_rules: |
    - Вопрос должен ПРЯМО вытекать из этой конкретной новости
    - НЕ вставляй "воровство/украли" если новость не о хищении
    - НЕ вставляй "коррупция" если новость не об этом
    - Тон подбирай под тему:
        Скандал/коррупция → вопрос о справедливости или ответственности
        Экономика/цены → вопрос о влиянии на жизнь людей
        Законы/решения власти → вопрос "поможет ли это вам"
        Инфраструктура/строительство → вопрос о качестве или безопасности
        Позитивная новость → вопрос "как вы к этому относитесь"
        Международная тема → вопрос о последствиях для Узбекистана
    - Вопрос должен быть один, конкретный, не длинный
    - Заканчивай: "Напишите в комментариях."
    - НЕ используй: "Подписывайтесь", призывы к подписке

  # Фразы для начала TTS — выбирай по контексту, не шаблонно
  # НЕ используй одну и ту же каждый раз. Лучший вариант — вообще
  # начать сразу с сильного факта без стандартной фразы.
  # Интро — НЕ шаблон, а тип хука под тему. Первое предложение = 50% успеха.
  tts_intro_variants:
    - "(страх) Ты можешь [последствие] — и даже не знать об этом."
    - "(запрет) Тебе теперь придётся [что-то новое / ограничение]."
    - "(потеря) Ты теряешь [деньги/право] — прямо сейчас."
    - "(конфликт) Сразу с сильного факта без вступления — лучший вариант."
    - "(угроза) [Кому-то] грозит [последствие] — и это уже происходит."

  # Хэштеги которые добавляются ВСЕГДА (только в caption, не в TTS)
  hashtags_always:
    - "#узбекистан"
    - "#новости"
    - "#uzbekistan"
    - "#tashkent"

  # Хэштеги по категориям — добавляются автоматически (только в caption, не в TTS)
  hashtags_by_category:
    экономика:
      - "#экономика"
      - "#бизнес"
      - "#economy"
    политика:
      - "#политика"
      - "#politics"
    технологии:
      - "#технологии"
      - "#tech"
      - "#digital"
    транспорт:
      - "#транспорт"
      - "#авиация"
      - "#поезд"
    туризм:
      - "#туризм"
      - "#tourism"
      - "#travel"
    происшествия:
      - "#происшествия"
      - "#безопасность"
    общество:
      - "#общество"
      - "#ташкент"
      - "#жизньвузбекистане"

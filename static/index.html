<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>UZ News Bot</title>
<style>
  *, *::before, *::after { box-sizing: border-box; }

  :root {
    --bg: #f1f5f9;
    --card: #ffffff;
    --border: #e2e8f0;
    --text: #0f172a;
    --muted: #64748b;
    --primary: #2563eb;
    --primary-h: #1d4ed8;
    --success: #16a34a;
    --success-h: #15803d;
    --danger: #dc2626;
    --radius: 12px;
  }

  body {
    margin: 0;
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    background: var(--bg);
    color: var(--text);
    font-size: 14px;
    line-height: 1.5;
  }

  /* ── Header ── */
  .header {
    background: white;
    border-bottom: 1px solid var(--border);
    position: sticky;
    top: 0;
    z-index: 100;
  }
  .header-inner {
    max-width: 860px;
    margin: 0 auto;
    padding: .65rem 1rem;
    display: flex;
    align-items: center;
    gap: .75rem;
    flex-wrap: wrap;
  }
  .header h1 {
    margin: 0;
    font-size: 1rem;
    font-weight: 700;
    color: var(--text);
    white-space: nowrap;
  }
  .header-right {
    display: flex;
    align-items: center;
    gap: .5rem;
    margin-left: auto;
    flex-wrap: wrap;
  }
  .score-label {
    display: flex;
    align-items: center;
    gap: .35rem;
    color: var(--muted);
    font-size: .78rem;
    white-space: nowrap;
  }
  .score-label input {
    width: 52px;
    padding: .3rem .45rem;
    border: 1px solid var(--border);
    border-radius: 6px;
    font-size: .82rem;
    color: var(--text);
  }

  /* ── Buttons ── */
  .btn {
    display: inline-flex;
    align-items: center;
    gap: 4px;
    padding: .38rem .85rem;
    border: none;
    border-radius: 7px;
    font-size: .78rem;
    font-weight: 500;
    cursor: pointer;
    transition: background .13s, opacity .13s;
    white-space: nowrap;
  }
  .btn:disabled { opacity: .5; cursor: not-allowed; }
  .btn-primary  { background: var(--primary); color: white; }
  .btn-primary:hover:not(:disabled) { background: var(--primary-h); }
  .btn-success  { background: var(--success); color: white; }
  .btn-success:hover:not(:disabled) { background: var(--success-h); }
  .btn-ghost    { background: transparent; border: 1px solid var(--border); color: var(--text); }
  .btn-ghost:hover:not(:disabled) { background: var(--bg); }
  .btn-danger   { background: transparent; border: 1px solid #fca5a5; color: var(--danger); }
  .btn-danger:hover:not(:disabled) { background: #fef2f2; }

  /* ── Stats bar ── */
  .stats {
    max-width: 860px;
    margin: .85rem auto .4rem;
    padding: 0 1rem;
    display: flex;
    gap: .5rem;
    flex-wrap: wrap;
  }
  .pill {
    background: white;
    border: 1px solid var(--border);
    border-radius: 20px;
    padding: .22rem .75rem;
    font-size: .75rem;
    color: var(--muted);
  }
  .pill strong { color: var(--text); }

  /* ── List ── */
  .list {
    max-width: 860px;
    margin: 0 auto;
    padding: .4rem 1rem 3rem;
    display: flex;
    flex-direction: column;
    gap: .65rem;
  }

  /* ── Card ── */
  .card {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: .9rem 1rem;
  }
  .card.is-approved {
    border-left: 3px solid var(--success);
  }

  .card-head {
    display: flex;
    align-items: flex-start;
    justify-content: space-between;
    gap: .5rem;
    margin-bottom: .4rem;
  }
  .card-tags {
    display: flex;
    align-items: center;
    gap: .3rem;
    flex-wrap: wrap;
    flex: 1;
    min-width: 0;
  }

  .tag {
    display: inline-block;
    padding: .12rem .45rem;
    border-radius: 4px;
    font-size: .68rem;
    font-weight: 500;
    white-space: nowrap;
    background: #f1f5f9;
    color: var(--muted);
  }
  .tag-src      { background: #eff6ff; color: #1d4ed8; }
  .tag-approved { background: #f0fdf4; color: #15803d; }
  .tag-sent     { background: #faf5ff; color: #7c3aed; }

  .score {
    display: inline-flex;
    align-items: center;
    justify-content: center;
    min-width: 30px;
    height: 22px;
    padding: 0 6px;
    border-radius: 5px;
    font-size: .7rem;
    font-weight: 700;
    flex-shrink: 0;
  }
  .s0   { background: #f1f5f9; color: #94a3b8; }
  .s-lo { background: #fef3c7; color: #92400e; }
  .s-md { background: #dbeafe; color: #1e40af; }
  .s-hi { background: #dcfce7; color: #166534; }

  .card-title {
    font-size: .92rem;
    font-weight: 600;
    line-height: 1.4;
    margin: .2rem 0 .55rem;
  }
  .card-title a {
    color: var(--text);
    text-decoration: none;
  }
  .card-title a:hover { color: var(--primary); text-decoration: underline; }

  /* ── TTS block ── */
  .tts-wrap {
    background: #f8fafc;
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: .65rem .8rem;
    margin-bottom: .65rem;
  }
  .tts-top {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: .35rem;
  }
  .tts-top span {
    font-size: .67rem;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: .06em;
    color: var(--muted);
  }
  .tts-body {
    font-size: .83rem;
    line-height: 1.65;
    color: #374151;
    white-space: pre-wrap;
    word-break: break-word;
  }

  /* ── Actions ── */
  .card-actions {
    display: flex;
    gap: .35rem;
    flex-wrap: wrap;
  }

  /* ── Spinner ── */
  .spin {
    display: inline-block;
    width: 11px;
    height: 11px;
    border: 2px solid rgba(255,255,255,.35);
    border-top-color: white;
    border-radius: 50%;
    animation: rot .55s linear infinite;
  }
  .spin-dark {
    border-color: rgba(0,0,0,.15);
    border-top-color: var(--muted);
  }
  @keyframes rot { to { transform: rotate(360deg); } }

  /* ── Toast ── */
  .toast {
    position: fixed;
    bottom: 1.4rem;
    right: 1.4rem;
    background: #1e293b;
    color: white;
    padding: .6rem 1.1rem;
    border-radius: 8px;
    font-size: .82rem;
    opacity: 0;
    transform: translateY(8px);
    transition: opacity .18s, transform .18s;
    z-index: 999;
    pointer-events: none;
    max-width: 280px;
  }
  .toast.on   { opacity: 1; transform: translateY(0); }
  .toast.err  { background: #dc2626; }

  /* ── Empty / loading ── */
  .empty {
    text-align: center;
    padding: 3rem 1rem;
    color: var(--muted);
  }
</style>
</head>
<body>

<header class="header">
  <div class="header-inner">
    <h1>UZ News Bot</h1>
    <div class="header-right">
      <label class="score-label">
        Score ≥
        <input type="number" id="minScore" value="1" min="0" max="20" onchange="load()">
      </label>
      <button class="btn btn-ghost" onclick="load()">↻ Refresh</button>
      <button class="btn btn-primary" id="collectBtn" onclick="collectNow()">Collect Now</button>
    </div>
  </div>
</header>

<div class="stats" id="stats"></div>
<div class="list"  id="list"><div class="empty">Loading…</div></div>
<div class="toast" id="toast"></div>

<script>
"use strict";

let data = [];

/* ── HTTP helper ── */
async function req(method, path) {
  const r = await fetch(path, { method });
  if (r.status === 401) { location.href = "/login"; return null; }
  if (r.status === 204)  return null;
  if (!r.ok) throw new Error(await r.text());
  return r.json();
}

/* ── Toast ── */
function toast(msg, err = false) {
  const el = document.getElementById("toast");
  el.textContent = msg;
  el.className = "toast on" + (err ? " err" : "");
  clearTimeout(el._t);
  el._t = setTimeout(() => el.classList.remove("on"), 3200);
}

/* ── Score badge class ── */
function scoreClass(s) {
  if (!s)   return "s0";
  if (s<=2) return "s-lo";
  if (s<=4) return "s-md";
  return "s-hi";
}

/* ── Date formatter ── */
function fmtDate(str) {
  if (!str) return "";
  try {
    const d = new Date(str);
    if (!isNaN(d)) {
      return d.toLocaleDateString("ru-RU",{day:"2-digit",month:"2-digit"}) + " " +
             d.toLocaleTimeString("ru-RU",{hour:"2-digit",minute:"2-digit"});
    }
  } catch(_) {}
  return str.slice(0,16).replace("T"," ");
}

/* ── HTML escape ── */
function esc(s) {
  return String(s||"")
    .replace(/&/g,"&amp;").replace(/</g,"&lt;")
    .replace(/>/g,"&gt;").replace(/"/g,"&quot;");
}

/* ── Render one card ── */
function cardHtml(n) {
  const approved = n.approved === 1;
  const hasTTS   = !!n.tts_script;
  const sent     = n.sent_tg  === 1;

  const tags = [
    `<span class="tag tag-src">${esc(n.source||"")}</span>`,
    n.published ? `<span class="tag">${fmtDate(n.published)}</span>` : "",
    approved    ? `<span class="tag tag-approved">✓ Approved</span>` : "",
    sent        ? `<span class="tag tag-sent">Sent TG</span>`        : "",
  ].filter(Boolean).join("");

  const ttsBlock = hasTTS ? `
    <div class="tts-wrap">
      <div class="tts-top">
        <span>TTS Script</span>
        <button class="btn btn-ghost" style="padding:.2rem .6rem;font-size:.72rem"
                onclick="copyTTS(${n.id})">Copy</button>
      </div>
      <div class="tts-body" id="tts-${n.id}">${esc(n.tts_script)}</div>
    </div>` : "";

  const actions = hasTTS
    ? `<button class="btn btn-success" id="apr-${n.id}"
               onclick="approve(${n.id})" ${approved?"disabled":""}>
         ${approved ? "✓ Approved" : "Approve"}
       </button>
       <button class="btn btn-ghost" id="reg-${n.id}" onclick="regen(${n.id})">Regenerate</button>
       <button class="btn btn-danger" onclick="del(${n.id})">Delete</button>`
    : `<button class="btn btn-primary" id="gen-${n.id}" onclick="generate(${n.id})">Generate TTS</button>
       <button class="btn btn-danger"  onclick="del(${n.id})">Delete</button>`;

  return `
    <div class="card ${approved?"is-approved":""}" id="card-${n.id}">
      <div class="card-head">
        <div class="card-tags">${tags}</div>
        <span class="score ${scoreClass(n.score)}">★ ${n.score}</span>
      </div>
      <div class="card-title">
        <a href="${esc(n.url)}" target="_blank" rel="noopener">${esc(n.title)}</a>
      </div>
      ${ttsBlock}
      <div class="card-actions">${actions}</div>
    </div>`;
}

/* ── Replace card in DOM ── */
function replaceCard(id) {
  const n = data.find(x => x.id === id);
  if (!n) return;
  const el = document.getElementById("card-" + id);
  if (!el) return;
  const tmp = document.createElement("div");
  tmp.innerHTML = cardHtml(n);
  el.replaceWith(tmp.firstElementChild);
}

/* ── Load news ── */
async function load() {
  const min = parseInt(document.getElementById("minScore").value) || 0;
  try {
    data = await req("GET", `/api/news?min_score=${min}&limit=100`);
    if (!data) return;

    const total    = data.length;
    const approved = data.filter(n => n.approved).length;
    const withTTS  = data.filter(n => n.tts_script).length;

    document.getElementById("stats").innerHTML =
      `<div class="pill">Всего: <strong>${total}</strong></div>
       <div class="pill">С TTS: <strong>${withTTS}</strong></div>
       <div class="pill">Approved: <strong>${approved}</strong></div>`;

    const list = document.getElementById("list");
    list.innerHTML = data.length
      ? data.map(cardHtml).join("")
      : `<div class="empty">Нет новостей. Попробуй снизить Score или нажми "Collect Now".</div>`;
  } catch(e) {
    toast("Ошибка загрузки: " + e.message, true);
  }
}

/* ── Collect now ── */
async function collectNow() {
  const btn = document.getElementById("collectBtn");
  btn.disabled = true;
  btn.innerHTML = `<span class="spin"></span> Collecting…`;
  try {
    await req("POST", "/api/collect");
    toast("Сбор запущен — обновление через ~15с");
    setTimeout(load, 15000);
  } catch(e) {
    toast("Ошибка: " + e.message, true);
  } finally {
    setTimeout(() => { btn.disabled = false; btn.textContent = "Collect Now"; }, 12000);
  }
}

/* ── Generate TTS ── */
async function generate(id) {
  const btn = document.getElementById("gen-" + id);
  if (btn) { btn.disabled = true; btn.innerHTML = `<span class="spin"></span> Генерирую…`; }
  try {
    const res = await req("POST", `/api/news/${id}/generate`);
    if (!res) return;
    const n = data.find(x => x.id === id);
    if (n) n.tts_script = res.tts_script;
    replaceCard(id);
    toast("TTS создан");
  } catch(e) {
    toast("Ошибка: " + e.message, true);
    if (btn) { btn.disabled = false; btn.textContent = "Generate TTS"; }
  }
}

/* ── Approve ── */
async function approve(id) {
  try {
    await req("POST", `/api/news/${id}/approve`);
    const n = data.find(x => x.id === id);
    if (n) n.approved = 1;
    replaceCard(id);
    toast("Одобрено ✓");
  } catch(e) {
    toast("Ошибка: " + e.message, true);
  }
}

/* ── Regenerate ── */
async function regen(id) {
  const btn = document.getElementById("reg-" + id);
  if (btn) { btn.disabled = true; btn.textContent = "Генерирую…"; }
  try {
    const res = await req("POST", `/api/news/${id}/regenerate`);
    if (!res) return;
    const n = data.find(x => x.id === id);
    if (n) { n.tts_script = res.tts_script; n.approved = 0; }
    replaceCard(id);
    toast("TTS перегенерирован");
  } catch(e) {
    toast("Ошибка: " + e.message, true);
    if (btn) { btn.disabled = false; btn.textContent = "Regenerate"; }
  }
}

/* ── Delete ── */
async function del(id) {
  if (!confirm("Удалить эту новость?")) return;
  try {
    await req("DELETE", `/api/news/${id}`);
    data = data.filter(x => x.id !== id);
    document.getElementById("card-" + id)?.remove();
    toast("Удалено");
  } catch(e) {
    toast("Ошибка: " + e.message, true);
  }
}

/* ── Copy TTS ── */
async function copyTTS(id) {
  const el = document.getElementById("tts-" + id);
  if (!el) return;
  try {
    await navigator.clipboard.writeText(el.textContent);
    toast("Скопировано в буфер");
  } catch(_) {
    const r = document.createRange();
    r.selectNode(el);
    window.getSelection().removeAllRanges();
    window.getSelection().addRange(r);
    document.execCommand("copy");
    window.getSelection().removeAllRanges();
    toast("Скопировано");
  }
}

load();
</script>
</body>
</html>
